<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>How to Move My Pets – Rappelz Guidelines</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet"/>
  <style>
    :root{--bg:#0a0907;--bg-card:#1a1710;--bg3:#242015;--gold:#c9a84c;--gold2:#e8c96a;--gold3:#f5e098;--gold-dim:#7a6330;--text:#d4c9a8;--text2:#a09070;--text3:#6a5f45;--border:rgba(201,168,76,0.18);}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html{scroll-behavior:smooth;}
    body{background:var(--bg);color:var(--text);font-family:'Crimson Pro',Georgia,serif;font-size:20px;line-height:1.65;min-height:100vh;}
    ::-webkit-scrollbar{width:6px;} ::-webkit-scrollbar-track{background:#111009;} ::-webkit-scrollbar-thumb{background:var(--gold-dim);border-radius:3px;}
    header{position:sticky;top:0;z-index:100;background:rgba(10,9,7,0.92);border-bottom:1px solid var(--border);backdrop-filter:blur(12px);padding:0 2rem;}
    .header-inner{max-width:860px;margin:0 auto;display:flex;align-items:center;gap:2rem;height:58px;}
    .logo{font-family:'Cinzel',serif;font-size:1.1rem;font-weight:700;color:var(--gold2);letter-spacing:0.12em;text-decoration:none;white-space:nowrap;text-shadow:0 0 20px rgba(201,168,76,0.4);}
    nav a{font-family:'Cinzel',serif;font-size:0.7rem;font-weight:600;letter-spacing:0.1em;color:var(--text2);text-decoration:none;padding:0 1rem;height:58px;display:flex;align-items:center;border-bottom:2px solid transparent;transition:color .2s,border-color .2s;}
    nav a:hover{color:var(--gold2);border-bottom-color:var(--gold);}
    .page{max-width:860px;margin:0 auto;padding:3rem 2rem;}
    .back-link{font-family:'Cinzel',serif;font-size:0.8rem;color:var(--gold-dim);text-decoration:none;margin-bottom:2rem;display:inline-block;}
    .back-link:hover{color:var(--gold2);}
    .tag{display:inline-block;font-family:'Cinzel',serif;font-size:0.68rem;letter-spacing:0.12em;font-weight:700;background:var(--bg3);border:1px solid var(--border);color:var(--gold-dim);padding:0.2rem 0.6rem;border-radius:3px;margin-bottom:1.2rem;}
    h1{font-family:'Cinzel',serif;font-size:2rem;font-weight:700;color:var(--gold3);margin-bottom:0.5rem;line-height:1.2;}
    h2{font-family:'Cinzel',serif;font-size:1.3rem;color:var(--gold2);margin:2rem 0 0.8rem;}
    p{margin-bottom:1rem;color:var(--text2);}
    .step-box{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:1.2rem 1.4rem;margin:1.2rem 0;}
    .step-box .kbd{display:inline-block;font-family:'Cinzel',serif;font-size:0.82rem;font-weight:700;color:var(--gold3);background:rgba(201,168,76,0.1);border:1px solid var(--gold-dim);border-radius:4px;padding:0.15rem 0.55rem;letter-spacing:0.05em;}
    .step-box p{margin:0;color:var(--text2);}
    footer{border-top:1px solid var(--border);padding:2rem;text-align:center;color:var(--text3);font-size:0.82rem;font-style:italic;margin-top:4rem;}
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <a class="logo" href="../../../">RAPPELZ<span style="color:var(--text3);font-weight:400;font-size:0.75rem;margin-left:4px;">GUIDELINES</span></a>
    <nav>
      <a href="../../../">&larr; Back to Home</a>
    </nav>
  </div>
</header>

<div class="page">
  <a class="back-link" href="../../../">&larr; Back to Home</a>
  <span class="tag">PETS</span>

  <h1>How to Move My Pets</h1>

  <h2>Pet Controls</h2>

  <div class="step-box">
    <p><span class="kbd">Shift + Left Click</span> &nbsp;&mdash;&nbsp; Move your pet only, without moving your character.</p>
  </div>

  <div class="step-box">
    <p><span class="kbd">Alt + Left Click</span> &nbsp;&mdash;&nbsp; Send your pet to attack.</p>
  </div>

</div>

<footer>
  <strong>RAPPELZ GUIDELINES</strong> &mdash; Fan-made community guide
</footer>

</body>
</html>
