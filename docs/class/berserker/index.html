<style>
  :root { --bg0: #0a0907; --bg1: #111009; --bg2: #1a1710; --bg3: #242015; --gold: #c9a84c; --gold2: #e8c96a; --gold3: #f5e098; --gold-dim: #7a6330; --text: #d4c9a8; --text2: #a09070; --text3: #6a5f45; --border: rgba(201,168,76,0.18); }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body { background: var(--bg0); color: var(--text); font-family: 'Crimson Pro', Georgia, serif; font-size: 17px; line-height: 1.65; min-height: 100vh; }

  <h1>Berserker</h1>
  <span class="tier-badge">Tier S</span>

  <h2>Overview</h2>
  <table class="info-table">
    <tr><td><strong>Role</strong></td><td>DPS / subtank</td></tr>
    <tr><td><strong>Difficulty</strong></td><td>Easy</td></tr>
    <tr><td><strong>Strengths</strong></td><td>Has burst damage and amazing sustain</td></tr>
    <tr><td><strong>Weaknesses</strong></td><td>Only 3 main damage skills with ~30sec CD (can go lower with helmet+24 and + cards)</td></tr>
    <tr><td><strong>Why Play It</strong></td><td>If you like cool sword animations, easy to progress melee character, this is the class!</td></tr>
  </table>

  <h2>Skills</h2>
  <h3>Main Skills</h3>
  <ul style="color: var(--text2);">
    <li><span style="color: var(--text2);">Phantasm</span></li>
    <li><span style="color: var(--text2);">Hellstorm</span></li>
    <li><span style="color: var(--text2);">Deadly Dancing</span></li>
    <li><span style="color: var(--text2);">Apocalypse</span></li>
    <li><span style="color: var(--text2);font-weight:bold;">Phase Blades</span> (this is the skill you aim to have in all your gear)</li>
  </ul>
  <h3>Useful Skills</h3>
  <ul style="color: var(--text2);">
    <li>Gloom Aura for pulling</li>
    <li>Binding Dust and Smoke Bomb for more dodging and tanking capabilities</li>
    <li>Sudden Rush for maximum speeeeeeeeeeed!</li>
  </ul>
  <h3>Defensive Buffs</h3>
  <ul style="color: var(--text2);">
    <li>Pact with Darkness</li>
    <li>Shadowforged Plating</li>
    <li>Cloak of Shadows</li>
    <li>Distortion</li>
  </ul>

  <h2>Rotations</h2>
  <h3>Single Target</h3>
  <p>Phantasm annihilates bosses.</p>
  <h3>AoE / Multi-Target</h3>
  <p>Hellstorm, Deadly Dancing, Apocalypse.</p>

  <h2>Talent Build</h2>
  <table class="info-table">
    <thead><tr><th>Points</th><th>Allocation</th></tr></thead>
    <tbody>
      <tr><td>5 TP</td><td>2 | 2 | 1</td></tr>
      <tr><td>6 TP</td><td>2 | 2 | 2</td></tr>
      <tr><td>7 TP</td><td>2 | 2 | 3</td></tr>
    </tbody>
  </table>

  <h2>Stats</h2>
  <table class="info-table">
    <thead><tr><th>Priority</th><th>Stats</th></tr></thead>
    <tbody>
      <tr><td>Damage</td><td>100% critical rate, Critical Power (CP), STR &rarr; ordered by priority</td></tr>
      <tr><td>Defense</td><td>Agility &rarr; more Agility means more HP and Evasion</td></tr>
    </tbody>
  </table>

  <h2>Accessories</h2>
  <table class="info-table">
    <thead><tr><th>Setup</th><th>Accessories</th></tr></thead>
    <tbody>
      <tr><td>Damage</td><td>Rings with 40+ STR/20+ CP, the 3rd stat could be movement speed, Evasion, P.atk depends on what you need.</td></tr>
    </tbody>
  </table>

  <h2>Pets &amp; Belt</h2>
  <table class="info-table">
    <thead><tr><th>Slot</th><th>Recommendation</th></tr></thead>
    <tbody>
      <tr><td>Belt pets</td><td>
        <strong>Cheap setup:</strong> 2 unicorn S3, 2 kenta s0, Snowman &rarr; worth sacrificing 1 unicorn for P.hector card<br>
        <strong>Normal setup:</strong> 3 Mino S3, 2 unicorns S5, Snowman<br>
        <strong>Expensive setup:</strong> 3 x Death Gladiators S0, 2 snowman/2 cubes/2 S3 picks (depends on what you need)
      </td></tr>
      <tr><td>Summoned pet</td><td>
        <a class="content-link" href="../../pet/bloodthirsty-slaughterer.html">Bloodthirsty Slaughterer</a> or <a class="content-link" href="../../pet/wind-pixie.html">Wind Pixie</a> (depends on the content)
      </td></tr>
    </tbody>
  </table>

  <h2>Gear</h2>
  <h3>Progression Path</h3>
  <ol class="priority-list">
    <li>R2 helmet +20 (all skills +1)</li>
    <li>R6 +15 gear from hidden sanctuary</li>
    <li>Circus weapons and accessories from Circus dungeon</li>
    <li>Parallel World gear (either trash stats 2 slots with Phase blades, or max slots in each gear but trash skill, depends on what you could find)</li>
    <li>Island of gods weapons and rings</li>
    <li>DD Accessories and Yushiva belt</li>
    <li>Lava gear (boots, gloves, armor, helmet)</li>
    <li>Medal</li>
    <li>Emblem</li>
  </ol>
  <h3>Optimization</h3>
  <p>You upgrade the above when it's applicable e.g., more slots in belt, +24 weapon, +24 medusa helmet, better stats on gear. You always prioritize stats like the following item:</p>
  <p><em>Perfect Sword Example (image removed)</em></p>
  <p>Example of purple stats you look for:</p>
  <ul>
    <li>Evasion and movement speed on boots | Evasion or CP on armor, Emblem, Medal</li>
    <li>Accuracy on gloves, medal or emblem</li>
  </ul>
  <table class="info-table" style="margin-top:1.2rem;">
    <thead>
      <tr><th colspan="2">Stat Targets &amp; Item Stat Info</th></tr>
    </thead>
    <tbody>
      <tr><td colspan="2" style="color:var(--gold2);font-weight:600;">Accuracy Target</td></tr>
      <tr><td>RoA</td><td>1000+ Accuracy</td></tr>
      <tr><td>Hidden RoA</td><td>1200+ Accuracy</td></tr>
      <tr><td>DD6 (level 180)</td><td>1500+ Accuracy</td></tr>
      <tr><td>SF (level 200)</td><td>2000+ Accuracy</td></tr>
      <tr><td colspan="2" style="color:var(--gold2);font-weight:600;">Evasion Target</td></tr>
      <tr><td>RoA / Hroa</td><td>3000+ Evasion</td></tr>
      <tr><td>DD6</td><td>8000+ Evasion</td></tr>
      <tr><td colspan="2" style="font-size:0.98em;">&rArr; This is an approximate target stats !!</td></tr>
      <tr><td colspan="2" style="color:var(--gold2);font-weight:600;">Item Stat Examples</td></tr>
      <tr><td>Accuracy</td><td>~200+ on gloves, emblem, or medal</td></tr>
      <tr><td>Evasion</td><td>~160+ on boots, armor, medal, or emblem</td></tr>
      <tr><td>Movement Speed</td><td>~17+ on boots, 30+ on rings</td></tr>
      <tr><td colspan="2"><em>You can find the exact min/max stats on the Discord channel (to be imported here soon).</em></td></tr>
    </tbody>
  </table>


  <h2>Leveling Progression</h2>
  <ul>
     <li><a class="content-link" href="../../guide/getting-started/">Starting with Rappelz</a></li>
     <li><a class="content-link" href="../../guide/beyond-master-class/">Master Class and Beyond</a></li>
     <li><a class="content-link" href="../../guide/175-and-beyond/">175 and Beyond</a></li>
  </ul>

  <h2>Tips</h2>
  <ul>
    <li>You can always switch your <a class="content-link" href="../../pet/bloodthirsty-slaughterer.html">Bloodthirsty Slaughterer</a> with a <a class="content-link" href="../../pet/wind-pixie.html">Wind Pixie</a> if you find issues tanking.</li>
    <li>Lvl 2 potion of the above mentioned pets is a huge boost.</li>
    <li>When you rotate through rooms in DD6 for example, use Deadly Dancing in a room then Apocalypse + Hellstorm in the other room. Don't use all AOEs in 1 room or you'll end up losing so much time in the next one (this is of course if you can afford killing mobs with 1 or 2 skills only).</li>
    <li>If you ever pulled mobs by mistake don't run, you have Cloak of Shadows and Distortion!</li>
    <li>Use Gloom Aura to pull 1 room, then Smoke Bomb to pull the next one.</li>
    <li>To be continued</li>
  </ul>

    <tbody>
      <tr><td>Performance</td><td>9/10</td></tr>
      <tr><td>Solo Ability</td><td>10/10</td></tr>
    </tbody>
  </table>
